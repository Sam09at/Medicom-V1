# Medicom Supabase CLI configuration
# Run `supabase link --project-ref meafkfylzqjtpfdhixhb` to connect to your project.

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "https://medicom-v1.vercel.app"
additional_redirect_urls = [
  "https://medicom-v1.vercel.app/reset-password",
  "http://localhost:5173/reset-password"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 6

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions.get-available-slots]
verify_jwt = false

[functions.create-booking-hold]
verify_jwt = false

[functions.verify-booking-otp]
verify_jwt = false

[functions.send-whatsapp]
verify_jwt = false

[analytics]
enabled = false
